<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Can Cleaning Co.</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background: var(--bg); }

    /* ── Login ── */
    .admin-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .admin-login-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .admin-login-card img { height: 48px; margin-bottom: 16px; }
    .admin-login-card h2 { margin-bottom: 6px; }
    .admin-login-card p { color: var(--text-light); margin-bottom: 24px; }

    /* ── Dashboard ── */
    .admin-dashboard { display: none; }
    .admin-header {
      background: var(--blue-dark);
      padding: 14px 0;
    }
    .admin-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 { font-size: 1.2rem; color: #fff; margin: 0; }

    /* ── Toolbar ── */
    .admin-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }
    .admin-toolbar h2 { margin: 0; }
    .admin-toolbar p { margin: 4px 0 0; color: var(--text-light); font-size: 0.9rem; }
    .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-row label { font-weight: 600; font-size: 0.9rem; }
    .filter-row input[type="date"] {
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }

    /* ── Date Group ── */
    .date-group { margin-bottom: 36px; }
    .date-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 14px;
    }
    .date-group-header h3 { margin: 0; font-size: 1.1rem; }
    .date-group-header span { color: var(--text-light); font-size: 0.88rem; }

    /* ── Booking Card ── */
    .booking-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stop-num {
      width: 30px;
      height: 30px;
      background: var(--blue);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .booking-info { flex: 1; min-width: 0; }
    .booking-info strong { display: block; font-size: 1rem; }
    .booking-info span { color: var(--text-light); font-size: 0.88rem; }
    .booking-meta { text-align: right; flex-shrink: 0; }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
    }
    .badge-onetime { background: #EFF6FF; color: #1565C0; }
    .badge-monthly { background: #F0FDF4; color: #166534; }
    .booking-meta .phone { font-size: 0.85rem; color: var(--text-light); margin-top: 4px; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    .error-state {
      background: #FEF2F2;
      border: 1.5px solid #FECACA;
      border-radius: var(--radius);
      padding: 20px 24px;
      color: #991B1B;
    }

    @media (max-width: 580px) {
      .booking-card { flex-wrap: wrap; }
      .booking-meta { text-align: left; }
    }
  </style>
</head>
<body>

<!-- ── Login Screen ───────────────────────── -->
<div class="admin-login" id="login-screen">
  <div class="admin-login-card">
    <img src="images/logo.png" alt="Can Cleaning Co." />
    <h2>Admin Login</h2>
    <p>Can Cleaning Co. booking manager</p>
    <div class="form-group">
      <input type="password" id="pw-input" placeholder="Enter password" style="text-align:center;" />
    </div>
    <div id="login-error" style="color:#DC2626; font-size:0.875rem; margin-bottom:12px; display:none;">Incorrect password.</div>
    <button class="btn btn-primary" style="width:100%;" onclick="login()">Sign In</button>
  </div>
</div>

<!-- ── Dashboard ─────────────────────────── -->
<div class="admin-dashboard" id="dashboard">

  <div class="admin-header">
    <div class="container">
      <h1>Can Cleaning Co. — Bookings</h1>
      <button class="btn btn-sm" onclick="logout()" style="background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3);">Sign Out</button>
    </div>
  </div>

  <div class="container" style="padding-top:32px; padding-bottom:64px;">

    <div class="admin-toolbar">
      <div>
        <h2>Upcoming Bookings</h2>
        <p id="booking-count">Loading…</p>
      </div>
      <div class="filter-row">
        <label for="filter-date">Date:</label>
        <input type="date" id="filter-date" onchange="renderBookings()" />
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('filter-date').value=''; renderBookings()">Clear</button>
        <button class="btn btn-secondary btn-sm" onclick="loadBookings()">Refresh</button>
      </div>
    </div>

    <div id="bookings-container">
      <div class="empty-state">Loading bookings…</div>
    </div>

  </div>
</div>

<script>
  const ADMIN_PASSWORD = 'Yavauo2017';
  // TODO: Paste your Google Apps Script URL here after deploying
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcrKhNet5_WuKXKCh6TRXYRoYgwE2kzm6AQ2Fy7hD2hAXwj0I2uINmPOJOLasKkaer/exec';

  let allBookings = [];

  function login() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadBookings();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });

  function logout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pw-input').value = '';
    allBookings = [];
  }

  async function loadBookings() {
    document.getElementById('bookings-container').innerHTML = '<div class="empty-state">Loading…</div>';
    document.getElementById('booking-count').textContent = 'Loading…';
    try {
      const res = await fetch(SCRIPT_URL + '?key=' + encodeURIComponent(ADMIN_PASSWORD));
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      // Sort by preferred date ascending, skip past bookings
      allBookings = data.sort((a, b) => new Date(a['Preferred Date']) - new Date(b['Preferred Date']));
      renderBookings();
    } catch (err) {
      document.getElementById('bookings-container').innerHTML =
        '<div class="error-state"><strong>Could not load bookings.</strong><br>Make sure your Apps Script URL is set in admin.html and the script is deployed correctly.</div>';
      document.getElementById('booking-count').textContent = 'Error loading';
    }
  }

  function renderBookings() {
    const filterDate = document.getElementById('filter-date').value;
    const filtered = filterDate
      ? allBookings.filter(b => b['Preferred Date'] === filterDate)
      : allBookings;

    document.getElementById('booking-count').textContent =
      filtered.length + ' booking' + (filtered.length !== 1 ? 's' : '');

    if (filtered.length === 0) {
      document.getElementById('bookings-container').innerHTML = '<div class="empty-state">No bookings found.</div>';
      return;
    }

    // Group by date
    const groups = {};
    filtered.forEach(b => {
      const d = b['Preferred Date'] || 'Unknown';
      if (!groups[d]) groups[d] = [];
      groups[d].push(b);
    });

    let html = '';
    Object.keys(groups).sort().forEach(date => {
      const bookings = groups[date];
      const label = date !== 'Unknown'
        ? new Date(date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })
        : 'Unknown Date';

      // Build Google Maps route URL
      const stops = bookings.map(b => encodeURIComponent([b.Address, b.City, 'TX', b.ZIP].filter(Boolean).join(', ')));
      const mapsUrl = 'https://www.google.com/maps/dir/' + stops.join('/');

      html += `
        <div class="date-group">
          <div class="date-group-header">
            <div>
              <h3>${label}</h3>
              <span>${bookings.length} stop${bookings.length !== 1 ? 's' : ''}</span>
            </div>
            <a href="${mapsUrl}" target="_blank" rel="noopener" class="btn btn-primary btn-sm">Open Route in Maps</a>
          </div>
      `;

      bookings.forEach((b, i) => {
        const isMonthly = (b['Service Type'] || '').toLowerCase().includes('monthly');
        const cans = b['Cans'] || '—';
        const badgeLabel = isMonthly ? 'Monthly' : (cans + ' can' + (cans != 1 ? 's' : ''));
        html += `
          <div class="booking-card">
            <div class="stop-num">${i + 1}</div>
            <div class="booking-info">
              <strong>${b.Name || '—'}</strong>
              <span>${[b.Address, b.City, b.ZIP].filter(Boolean).join(', ')}</span>
            </div>
            <div class="booking-meta">
              <span class="badge ${isMonthly ? 'badge-monthly' : 'badge-onetime'}">${badgeLabel}</span>
              <div class="phone">${b.Phone || ''}</div>
            </div>
          </div>
        `;
      });

      html += '</div>';
    });

    document.getElementById('bookings-container').innerHTML = html;
  }
</script>

</body>
</html>
